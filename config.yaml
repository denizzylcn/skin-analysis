project:
  name: skin-analysis
  version: 1.0.0
  seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  manifests_dir: data/manifests
  img_size: 224
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

quality:
  blur_threshold: 15       # Laplacian variance altı = bulanık
  dark_threshold: 40       # Ortalama parlaklık altı = karanlık
  bright_threshold: 230    # Ortalama parlaklık üstü = aşırı parlak
  min_size_px: 50

augmentation:
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2

model:
  backbone: efficientnet_b3
  num_classes:
    skin_type: 3
    acne: 4
    lesion: 7
  pretrained: true
  dropout: 0.3

training:
  batch_size: 32
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  patience: 5            # Early stopping

api:
  host: 0.0.0.0
  port: 8000
  max_file_size_mb: 10
